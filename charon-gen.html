<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#050505">

<meta
name="color-scheme"
content="dark">

<title>
Charon Gen
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

<link
rel="stylesheet"
href="charon-gen.css">

</head>

<body>

<div class="bg-glow"></div>

<header class="hero glass">

<h1>
Charon Gen
</h1>

<p>
Generate Steam manifests instantly using App ID
</p>

<div class="buttons">

<a
href="index.html"
class="btn discord">

← Back to Charon

</a>

</div>

</header>


<section class="glass generator">

<h2>

Search App

</h2>


<div class="gen-box">

<input
id="appid"
type="number"
placeholder="Enter Steam App ID">

<button
id="generateBtn">

Search

</button>

</div>


<div
id="status">

Ready

</div>


<div
id="gameCard"
class="game-card"
style="display:none;">


<img
id="gameImage"
alt="Game Banner">


<h3
id="gameName">

</h3>


<p
id="gameInfo">

</p>


<button
id="downloadBtn"
style="display:none;">

Download ZIP

</button>


</div>

</section>


<section class="glass">

<h2>

Search Order

</h2>


<div class="steps">

<div>
📂 Database 1
</div>

<div>
📂 Database 2
</div>

<div>
🌐 External API
</div>

</div>


<p
style="
text-align:center;
color:var(--muted);
margin-top:20px;
">

Game details are fetched first.
ZIP appears only when available.

</p>

</section>


<footer>

<a
href="index.html">

Home

</a>

<p>

© 2026 Charon

</p>

</footer>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="charon-gen.js"></script>

</body>

</html>
