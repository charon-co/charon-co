<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#050505">

<title>Charon Gen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="charon-gen.css">
</head>

<body>

<div class="bg-glow"></div>

<header class="hero glass">

<h1>Charon Gen</h1>

<p>
Generate manifests using Steam App ID
</p>

<div class="buttons">
<a href="index.html" class="btn discord">
← Back
</a>
</div>

</header>



<section class="glass generator">

<h2>Generate</h2>

<div class="gen-box">

<input
id="appid"
type="text"
placeholder="Enter Steam App ID">

<button
id="generateBtn">

Search

</button>

</div>

<div id="status">
Ready
</div>


<div id="gameCard" class="game-card">

<img
id="gameImage"
alt="Game">

<h3 id="gameName"></h3>

<p id="gameInfo"></p>

<button id="downloadBtn">

Download ZIP

</button>

</div>

</section>


<script
src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
</script>

<script src="charon-gen.js"></script>

</body>

</html>
